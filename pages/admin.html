<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Android Development</title>
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>
    <nav id="navbar"></nav>
    
    <main class="admin-content">
        <h1>Admin Panel</h1>
        
        <section class="admin-section">
            <h2>Upload Tools & Drivers</h2>
            
            <div class="upload-form">
                <h3>Upload New Tool</h3>
                <form id="tool-upload-form">
                    <div class="form-group">
                        <label for="tool-name">Tool Name:</label>
                        <input type="text" id="tool-name" name="toolName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="tool-description">Description:</label>
                        <textarea id="tool-description" name="description" rows="4" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="tool-version">Version:</label>
                        <input type="text" id="tool-version" name="version" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="tool-file">Select File:</label>
                        <input type="file" id="tool-file" name="toolFile" accept=".zip,.exe,.apk,.jar,.rar" required>
                        <small>Supported formats: ZIP, EXE, APK, JAR, RAR</small>
                    </div>
                    
                    <button type="submit" class="btn-primary">Upload Tool</button>
                </form>
            </div>

            <div class="upload-form">
                <h3>Upload New Driver</h3>
                <form id="driver-upload-form">
                    <div class="form-group">
                        <label for="driver-name">Driver Name:</label>
                        <input type="text" id="driver-name" name="driverName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="driver-description">Description:</label>
                        <textarea id="driver-description" name="description" rows="4" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="driver-device">Compatible Device:</label>
                        <input type="text" id="driver-device" name="device" placeholder="e.g., Pixel 6, Samsung Galaxy" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="driver-version">Version:</label>
                        <input type="text" id="driver-version" name="version" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="driver-file">Select File:</label>
                        <input type="file" id="driver-file" name="driverFile" accept=".zip,.exe,.bin,.img" required>
                        <small>Supported formats: ZIP, EXE, BIN, IMG</small>
                    </div>
                    
                    <button type="submit" class="btn-primary">Upload Driver</button>
                </form>
            </div>
        </section>

        <section class="admin-section">
            <h2>Uploaded Items</h2>
            
            <div class="items-list">
                <h3>Tools</h3>
                <div id="tools-uploaded" class="items-container">
                    <p>No tools uploaded yet</p>
                </div>
            </div>

            <div class="items-list">
                <h3>Drivers</h3>
                <div id="drivers-uploaded" class="items-container">
                    <p>No drivers uploaded yet</p>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer"></footer>
    
    <script src="../js/navbar.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
